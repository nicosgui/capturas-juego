name: Capturar Godot con Xvfb

on:
  workflow_dispatch:
    inputs:
      project_zip:
        description: "Opcional. ZIP a usar; si queda vacio, autodetecta un ZIP con project.godot"
        required: false
        default: ""
      project_dir:
        description: "Carpeta del proyecto Godot dentro del ZIP"
        required: false
        default: "sc0312"
      godot_version:
        description: "Version Godot Mono estable"
        required: false
        default: "4.7"
      dotnet_version:
        description: "Version .NET SDK"
        required: false
        default: "10.0.x"
      capture_scene:
        description: "Opcional. Escena Godot que genera las capturas; si queda vacio, autodetecta"
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - ".github/workflows/capturas-godot.yml"
      - "**/*.zip"
      - "**/project.godot"
      - "**/scenes/**"
      - "**/scripts/**"
      - "**/scripts_csharp/**"
      - "**/data/**"
      - "**/assets/**"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  capturar:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DOTNET_ROLL_FORWARD: LatestMajor
      GODOT_SILENCE_ROOT_WARNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias graficas
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            unzip \
            xvfb \
            libgl1 \
            libglu1-mesa \
            libx11-6 \
            libxcursor1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxinerama1 \
            libxrandr2 \
            libxrender1 \
            libpulse0 \
            libudev1

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ github.event.inputs.dotnet_version || '10.0.x' }}

      - name: Resolver proyecto Godot
        run: |
          REQUESTED_ZIP="${{ github.event.inputs.project_zip || '' }}"
          PROJECT_DIR="${{ github.event.inputs.project_dir || 'sc0312' }}"
          ZIP_NAME=""

          zip_has_project() {
            local zip_path="$1"
            unzip -Z1 "$zip_path" 2>/dev/null | grep -Eq '(^|/)project\.godot$'
          }

          event_zip_candidates() {
            python3 - <<'PY'
          import json
          import os

          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          try:
              with open(event_path, "r", encoding="utf-8") as event_file:
                  event = json.load(event_file)
          except Exception:
              event = {}

          seen = set()
          for commit in event.get("commits", []):
              for key in ("added", "modified"):
                  for file_name in commit.get(key, []):
                      if file_name.lower().endswith(".zip") and file_name not in seen:
                          seen.add(file_name)
                          print(file_name)
          head_commit = event.get("head_commit") or {}
          for key in ("added", "modified"):
              for file_name in head_commit.get(key, []):
                  if file_name.lower().endswith(".zip") and file_name not in seen:
                      seen.add(file_name)
                      print(file_name)
          PY
          }

          if [ -f "$PROJECT_DIR/project.godot" ]; then
            echo "Usando proyecto versionado en repo: $PROJECT_DIR"
            echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
            echo "PROJECT_ZIP=repo-source" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -n "$REQUESTED_ZIP" ]; then
            if [ ! -f "$REQUESTED_ZIP" ]; then
              echo "El ZIP pedido no existe: $REQUESTED_ZIP"
              find . -maxdepth 2 -type f -iname '*.zip' -print | sort
              exit 1
            fi
            ZIP_NAME="$REQUESTED_ZIP"
          fi

          if [ -z "$ZIP_NAME" ]; then
            while IFS= read -r candidate; do
              [ -z "$candidate" ] && continue
              candidate="${candidate#./}"
              if [ -f "$candidate" ] && zip_has_project "$candidate"; then
                ZIP_NAME="$candidate"
                break
              fi
            done < <(event_zip_candidates)
          fi

          if [ -z "$ZIP_NAME" ] && [ -f "statecraft_github_latest.zip" ] && zip_has_project "statecraft_github_latest.zip"; then
            ZIP_NAME="statecraft_github_latest.zip"
          fi

          if [ -z "$ZIP_NAME" ]; then
            while IFS= read -r candidate; do
              [ -z "$candidate" ] && continue
              candidate="${candidate#./}"
              if zip_has_project "$candidate"; then
                ZIP_NAME="$candidate"
                break
              fi
            done < <(find . -maxdepth 2 -type f -iname '*.zip' | sort -Vr)
          fi

          if [ -z "$ZIP_NAME" ] || [ ! -f "$ZIP_NAME" ]; then
            echo "No se encontro ZIP con project.godot. ZIPs disponibles:"
            find . -maxdepth 2 -type f -iname '*.zip' -print | sort
            exit 1
          fi

          if ! zip_has_project "$ZIP_NAME"; then
            echo "El ZIP elegido no contiene project.godot: $ZIP_NAME"
            exit 1
          fi

          echo "Usando ZIP: $ZIP_NAME"
          ls -lh "$ZIP_NAME"
          unzip -q -o "$ZIP_NAME"

          if [ ! -f "$PROJECT_DIR/project.godot" ]; then
            FOUND_PROJECT="$(find . -maxdepth 5 -type f -name project.godot | sort | head -n 1 || true)"
            if [ -n "$FOUND_PROJECT" ]; then
              PROJECT_DIR="$(dirname "$FOUND_PROJECT" | sed 's#^./##')"
            fi
          fi

          test -f "$PROJECT_DIR/project.godot"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "PROJECT_ZIP=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Descargar Godot Mono
        run: |
          GODOT_VERSION="${{ github.event.inputs.godot_version || '4.7' }}"
          mkdir -p .godot-ci
          LOCAL_ZIP="Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          if [ -f "$LOCAL_ZIP" ]; then
            cp "$LOCAL_ZIP" .godot-ci/godot.zip
          else
            curl -L --fail --retry 3 \
              -o .godot-ci/godot.zip \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          fi
          unzip -q .godot-ci/godot.zip -d .godot-ci
          GODOT_BIN="$(find .godot-ci -type f -name 'Godot_v*-stable_mono_linux.x86_64' | head -n 1)"
          if [ -z "$GODOT_BIN" ]; then
            echo "No se encontro binario Godot dentro del ZIP descargado."
            find .godot-ci -maxdepth 4 -type f | sort
            exit 1
          fi
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$PWD/$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - name: Restaurar y compilar C#
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          dotnet restore StatecraftEurope1815.csproj --ignore-failed-sources -p:Platform="Any CPU" -p:NuGetAudit=false
          dotnet build StatecraftEurope1815.csproj -c Debug --no-restore -p:Platform="Any CPU" -p:NuGetAudit=false

      - name: Importar proyecto Godot
        run: |
          "$GODOT_BIN" --headless --path "$PROJECT_DIR" --import --quit

      - name: Resolver escenas de validacion y captura
        run: |
          PROJECT_DIR="${PROJECT_DIR:-sc0312}"
          REQUESTED_CAPTURE_SCENE="${{ github.event.inputs.capture_scene || '' }}"

          normalize_scene() {
            local scene_path="$1"
            scene_path="${scene_path#./}"
            scene_path="${scene_path#$PROJECT_DIR/}"
            if [[ "$scene_path" == res://* ]]; then
              echo "$scene_path"
            else
              echo "res://$scene_path"
            fi
          }

          scene_exists() {
            local scene_path
            scene_path="$(normalize_scene "$1")"
            scene_path="${scene_path#res://}"
            [ -f "$PROJECT_DIR/$scene_path" ]
          }

          file_to_scene() {
            local file_path="$1"
            file_path="${file_path#./}"
            file_path="${file_path#$PROJECT_DIR/}"
            echo "res://$file_path"
          }

          MAP_SCENE=""
          if scene_exists "res://scenes/testing/GodotNetCSharpMapaTableroV091.tscn"; then
            MAP_SCENE="res://scenes/testing/GodotNetCSharpMapaTableroV091.tscn"
          else
            FOUND_MAP="$(find "$PROJECT_DIR/scenes/testing" -type f -iname '*Mapa*Tablero*.tscn' 2>/dev/null | sort -Vr | head -n 1 || true)"
            [ -n "$FOUND_MAP" ] && MAP_SCENE="$(file_to_scene "$FOUND_MAP")"
          fi

          POPUP_SCENE=""
          if scene_exists "res://scenes/testing/GodotNetCSharpDecisionPopupUXV0316.tscn"; then
            POPUP_SCENE="res://scenes/testing/GodotNetCSharpDecisionPopupUXV0316.tscn"
          else
            FOUND_POPUP="$(find "$PROJECT_DIR/scenes/testing" -type f \( -iname '*Popup*UX*.tscn' -o -iname '*Decision*Popup*.tscn' \) 2>/dev/null | sort -Vr | head -n 1 || true)"
            [ -n "$FOUND_POPUP" ] && POPUP_SCENE="$(file_to_scene "$FOUND_POPUP")"
          fi

          CAPTURE_SCENE=""
          if [ -n "$REQUESTED_CAPTURE_SCENE" ]; then
            CAPTURE_SCENE="$(normalize_scene "$REQUESTED_CAPTURE_SCENE")"
            if ! scene_exists "$CAPTURE_SCENE"; then
              echo "La escena de captura pedida no existe: $CAPTURE_SCENE"
              exit 1
            fi
          elif scene_exists "res://scenes/testing/GodotNetCSharpDecisionPopupCaptureV0316.tscn"; then
            CAPTURE_SCENE="res://scenes/testing/GodotNetCSharpDecisionPopupCaptureV0316.tscn"
          else
            FOUND_CAPTURE="$(find "$PROJECT_DIR/scenes/testing" -type f \( -iname '*Capture*.tscn' -o -iname '*Capturas*.tscn' \) 2>/dev/null | sort -Vr | head -n 1 || true)"
            [ -n "$FOUND_CAPTURE" ] && CAPTURE_SCENE="$(file_to_scene "$FOUND_CAPTURE")"
          fi

          if [ -z "$CAPTURE_SCENE" ]; then
            echo "No se encontro escena de captura."
            find "$PROJECT_DIR/scenes/testing" -maxdepth 1 -type f -name '*.tscn' 2>/dev/null | sort || true
            exit 1
          fi

          echo "MAP_SCENE=$MAP_SCENE" >> "$GITHUB_ENV"
          echo "POPUP_SCENE=$POPUP_SCENE" >> "$GITHUB_ENV"
          echo "CAPTURE_SCENE=$CAPTURE_SCENE" >> "$GITHUB_ENV"
          echo "Mapa: ${MAP_SCENE:-omitido}"
          echo "Popup: ${POPUP_SCENE:-omitido}"
          echo "Captura: $CAPTURE_SCENE"

      - name: Validar mapa tablero headless
        run: |
          if [ -z "${MAP_SCENE:-}" ]; then
            echo "No se encontro escena de mapa; se omite validacion de mapa."
            exit 0
          fi
          "$GODOT_BIN" --headless --path "$PROJECT_DIR" --scene "$MAP_SCENE"

      - name: Validar popup UX headless
        id: validar_popup
        continue-on-error: true
        run: |
          if [ -z "${POPUP_SCENE:-}" ]; then
            echo "No se encontro escena popup UX; se omite validacion popup."
            exit 0
          fi
          "$GODOT_BIN" --headless --path "$PROJECT_DIR" --scene "$POPUP_SCENE"

      - name: Capturar con Xvfb
        run: |
          xvfb-run -a -s "-screen 0 1600x900x24" \
            "$GODOT_BIN" \
            --path "$PROJECT_DIR" \
            --display-driver x11 \
            --rendering-driver opengl3 \
            --audio-driver Dummy \
            --resolution 1600x900 \
            --single-window \
            --scene "$CAPTURE_SCENE"

      - name: Listar salidas
        if: always()
        run: |
          find "${PROJECT_DIR:-sc0312}/reports" -maxdepth 5 -type f | sort || true

      - name: Publicar capturas latest en repo
        if: always()
        run: |
          PROJECT_DIR="${PROJECT_DIR:-sc0312}"
          CAPTURE_ROOT="$PROJECT_DIR/reports/capturas"
          CAPTURE_SRC=""
          CAPTURE_TMP="$RUNNER_TEMP/statecraft-captures-latest"
          rm -rf "$CAPTURE_TMP"
          mkdir -p "$CAPTURE_TMP"

          CAPTURE_STATUS="missing"
          if [ -d "$CAPTURE_ROOT" ]; then
            CAPTURE_SRC="$(
              find "$CAPTURE_ROOT" -type f -name '*.png' -printf '%T@ %h\n' 2>/dev/null \
                | sort -nr \
                | awk '{$1=""; sub(/^ /,""); print; exit}'
            )"
          fi

          if [ -n "$CAPTURE_SRC" ] && [ -d "$CAPTURE_SRC" ]; then
            cp -R "$CAPTURE_SRC"/. "$CAPTURE_TMP"/
            CAPTURE_STATUS="ok"
          fi

          export CAPTURE_STATUS CAPTURE_SRC CAPTURE_TMP PROJECT_DIR PROJECT_ZIP CAPTURE_SCENE MAP_SCENE POPUP_SCENE
          python3 - <<'PY'
          import datetime
          import json
          import os
          import pathlib

          capture_tmp = pathlib.Path(os.environ["CAPTURE_TMP"])
          images = sorted(
              str(path.relative_to(capture_tmp)).replace("\\", "/")
              for path in capture_tmp.rglob("*.png")
          )
          manifest = {
              "status": os.environ.get("CAPTURE_STATUS", "missing"),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_url": "https://github.com/{}/actions/runs/{}".format(
                  os.environ.get("GITHUB_REPOSITORY", ""),
                  os.environ.get("GITHUB_RUN_ID", ""),
              ),
              "sha": os.environ.get("GITHUB_SHA", ""),
              "project_zip": os.environ.get("PROJECT_ZIP", "unknown"),
              "project_dir": os.environ.get("PROJECT_DIR", "unknown"),
              "capture_scene": os.environ.get("CAPTURE_SCENE", ""),
              "map_scene": os.environ.get("MAP_SCENE", ""),
              "popup_scene": os.environ.get("POPUP_SCENE", ""),
              "capture_source": os.environ.get("CAPTURE_SRC", ""),
              "created_at_utc": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "images": images,
          }
          (capture_tmp / "manifest.json").write_text(
              json.dumps(manifest, indent=2, ensure_ascii=True) + "\n",
              encoding="utf-8",
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git switch main || git switch -c main origin/main
          git pull --ff-only origin main
          rm -rf captures/latest
          mkdir -p captures/latest
          cp -R "$CAPTURE_TMP"/. captures/latest/
          git add captures/latest
          if git diff --cached --quiet; then
            echo "Sin cambios de capturas para publicar."
          else
            git commit -m "Actualizar capturas latest"
            git push origin main
          fi

      - name: Subir capturas y reportes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capturas-godot
          path: |
            ${{ env.PROJECT_DIR }}/reports/capturas/
            ${{ env.PROJECT_DIR }}/reports/*.json
            ${{ env.PROJECT_DIR }}/reports/*.log
          if-no-files-found: warn

      - name: Fallar si la validacion popup fallo
        if: steps.validar_popup.outcome == 'failure'
        run: |
          echo "La validacion popup UX fallo; las capturas ya fueron publicadas si estaban disponibles."
          exit 1
