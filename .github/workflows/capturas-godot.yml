name: Capturar Godot con Xvfb

on:
  workflow_dispatch:
    inputs:
      project_zip:
        description: "Nombre del ZIP del proyecto en la raiz del repo"
        required: true
        default: "statecraft_v0_3_16_popup_decision_ux_hover_GITHUB_SLIM (1).zip"
      project_dir:
        description: "Carpeta del proyecto Godot dentro del ZIP"
        required: true
        default: "sc0312"
      godot_version:
        description: "Version Godot Mono estable"
        required: true
        default: "4.7"
      dotnet_version:
        description: "Version .NET SDK"
        required: true
        default: "10.0.x"
      capture_scene:
        description: "Escena Godot que genera las capturas"
        required: true
        default: "res://scenes/testing/GodotNetCSharpDecisionPopupCaptureV0316.tscn"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/capturas-godot.yml"
      - "statecraft_v0_3_16_popup_decision_ux_hover_GITHUB_SLIM*.zip"

permissions:
  contents: write

jobs:
  capturar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOTNET_ROLL_FORWARD: LatestMajor
      GODOT_SILENCE_ROOT_WARNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias graficas
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            unzip \
            xvfb \
            libgl1 \
            libglu1-mesa \
            libx11-6 \
            libxcursor1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxinerama1 \
            libxrandr2 \
            libxrender1 \
            libpulse0 \
            libudev1

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version || '10.0.x' }}

      - name: Descomprimir proyecto
        run: |
          ZIP_NAME="${{ inputs.project_zip || 'statecraft_v0_3_16_popup_decision_ux_hover_GITHUB_SLIM (1).zip' }}"
          PROJECT_DIR="${{ inputs.project_dir || 'sc0312' }}"
          if [ ! -f "$ZIP_NAME" ]; then
            echo "No existe $ZIP_NAME en la raiz del repo. Zips disponibles:"
            find . -maxdepth 1 -type f -name '*.zip' -print | sort
            exit 1
          fi
          unzip -q -o "$ZIP_NAME"
          test -f "$PROJECT_DIR/project.godot"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Descargar Godot Mono
        run: |
          GODOT_VERSION="${{ inputs.godot_version || '4.7' }}"
          mkdir -p .godot-ci
          LOCAL_ZIP="Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          if [ -f "$LOCAL_ZIP" ]; then
            cp "$LOCAL_ZIP" .godot-ci/godot.zip
          else
            curl -L --fail --retry 3 \
              -o .godot-ci/godot.zip \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          fi
          unzip -q .godot-ci/godot.zip -d .godot-ci
          GODOT_BIN="$(find .godot-ci -type f -name 'Godot_v*-stable_mono_linux.x86_64' | head -n 1)"
          if [ -z "$GODOT_BIN" ]; then
            echo "No se encontro binario Godot dentro del ZIP descargado."
            find .godot-ci -maxdepth 4 -type f | sort
            exit 1
          fi
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$PWD/$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - name: Restaurar y compilar C#
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          dotnet restore StatecraftEurope1815.csproj --ignore-failed-sources -p:Platform="Any CPU" -p:NuGetAudit=false
          dotnet build StatecraftEurope1815.csproj -c Debug --no-restore -p:Platform="Any CPU" -p:NuGetAudit=false

      - name: Importar proyecto Godot
        run: |
          "$GODOT_BIN" --headless --path "$PROJECT_DIR" --import --quit

      - name: Validar popup UX headless
        id: validar_popup
        continue-on-error: true
        run: |
          "$GODOT_BIN" --headless --path "$PROJECT_DIR" --scene res://scenes/testing/GodotNetCSharpDecisionPopupUXV0316.tscn

      - name: Capturar con Xvfb
        run: |
          CAPTURE_SCENE="${{ inputs.capture_scene || 'res://scenes/testing/GodotNetCSharpDecisionPopupCaptureV0316.tscn' }}"
          xvfb-run -a -s "-screen 0 1600x900x24" \
            "$GODOT_BIN" \
            --path "$PROJECT_DIR" \
            --display-driver x11 \
            --rendering-driver opengl3 \
            --audio-driver Dummy \
            --resolution 1600x900 \
            --single-window \
            --scene "$CAPTURE_SCENE"

      - name: Listar salidas
        if: always()
        run: |
          find "${PROJECT_DIR:-sc0312}/reports" -maxdepth 4 -type f | sort || true

      - name: Publicar capturas latest en repo
        if: always()
        run: |
          PROJECT_DIR="${PROJECT_DIR:-${{ inputs.project_dir || 'sc0312' }}}"
          CAPTURE_SRC="$PROJECT_DIR/reports/capturas/v0_3_16_popup"
          CAPTURE_TMP="$RUNNER_TEMP/statecraft-captures-latest"
          rm -rf "$CAPTURE_TMP"
          mkdir -p "$CAPTURE_TMP"

          CAPTURE_STATUS="missing"
          if [ -d "$CAPTURE_SRC" ] && find "$CAPTURE_SRC" -type f -name '*.png' | grep -q .; then
            cp -R "$CAPTURE_SRC"/. "$CAPTURE_TMP"/
            CAPTURE_STATUS="ok"
          fi

          cat > "$CAPTURE_TMP/manifest.json" <<EOF
          {
            "status": "$CAPTURE_STATUS",
            "run_id": "$GITHUB_RUN_ID",
            "run_url": "https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID",
            "sha": "$GITHUB_SHA",
            "capture_source": "$CAPTURE_SRC",
            "created_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "expected_images": [
              "01_popup_accion_visible_v0316.png",
              "02_popup_oculto_tras_salida_v0316.png"
            ]
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git switch main || git switch -c main origin/main
          git pull --ff-only origin main
          rm -rf captures/latest
          mkdir -p captures/latest
          cp -R "$CAPTURE_TMP"/. captures/latest/
          git add captures/latest
          if git diff --cached --quiet; then
            echo "Sin cambios de capturas para publicar."
          else
            git commit -m "Actualizar capturas latest"
            git push origin main
          fi

      - name: Subir capturas y reportes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capturas-godot
          path: |
            ${{ env.PROJECT_DIR }}/reports/capturas/
            ${{ env.PROJECT_DIR }}/reports/*.json
            ${{ env.PROJECT_DIR }}/reports/*.log
          if-no-files-found: warn

      - name: Fallar si la validacion popup fallo
        if: steps.validar_popup.outcome == 'failure'
        run: |
          echo "La validacion popup UX fallo; las capturas ya fueron publicadas si estaban disponibles."
          exit 1
